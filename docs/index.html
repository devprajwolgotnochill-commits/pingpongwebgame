<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- The style is edited by copoilot ai -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ping Pong</title>
        <meta name="description" content="Classic Ping Pong game built with C++ and WebAssembly">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="game-container">
            <div id="title">PING PONG</div>
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
            <div id="loading" class="show">
                <div id="spinner"></div>
                <div id="status">Loading game...</div>
            </div>
            <div id="controls">
                <button onclick="Module.requestFullscreen(!1,!1)">⛶ FULLSCREEN</button>
                <button onclick="toggleAudio()" id="btn-audio">🔇 MUTE</button>
            </div>
        </div>

        <script>
            const audioContextList = [];
            const audioBtn = document.querySelector("#btn-audio");
            const canvas = document.querySelector("#canvas");
            const loadingDiv = document.querySelector("#loading");
            const statusDiv = document.querySelector("#status");

            function toggleAudio() {
                let shouldMute = false;
                audioContextList.forEach(ctx => {
                    if (ctx.state === "suspended") {
                        ctx.resume();
                        shouldMute = true;
                    } else if (ctx.state === "running") {
                        ctx.suspend();
                    }
                });
                audioBtn.textContent = shouldMute ? "🔇 MUTE" : "🔈 RESUME";
            }

            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    const ctx = new target(...args);
                    audioContextList.push(ctx);
                    if (ctx.state === "suspended") {
                        audioBtn.textContent = "🔈 RESUME";
                    }
                    return ctx;
                }
            });

            var Module = {
                preRun: [],
                postRun: [],
                print: function() {
                    return function(text) {
                        if (arguments.length > 1) {
                            text = Array.prototype.slice.call(arguments).join(" ");
                        }
                        console.log(text);
                    };
                }(),
                printErr: function(text) {
                    if (arguments.length > 1) {
                        text = Array.prototype.slice.call(arguments).join(" ");
                    }
                    console.error(text);
                },
                canvas: canvas,
                setStatus: function(text) {
                    if (text) {
                        statusDiv.textContent = text;
                        loadingDiv.classList.add("show");
                    } else {
                        loadingDiv.classList.remove("show");
                    }
                },
                totalDependencies: 0,
                monitorRunDependencies: function(left) {
                    this.totalDependencies = Math.max(this.totalDependencies, left);
                    Module.setStatus(
                        left
                            ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
                            : ""
                    );
                }
            };

            Module.setStatus("Loading game...");
            window.onerror = function() {
                Module.setStatus("An error occurred. Check the console.");
                Module.setStatus = function(text) {
                    if (text) Module.printErr("[Error] " + text);
                };
            };
        </script>
        <script src="pingpong.js" async></script>
    </body>
</html>
